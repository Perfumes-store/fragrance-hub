DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <title>My Perfume Store</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        .product { border: 1px solid #ccc; padding: 20px; margin: 10px; display: inline-block; width: 250px; }
        button { background-color: #25D366; color: white; padding: 10px; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Humare Behtareen Perfumes</h1>

    <div class="product">
        <h3>Luxury Oud</h3>
        <p>Price: Rs. 2,000</p>
        <button onclick="sendOrder('Luxury Oud')">Order on WhatsApp</button>
    </div>

    <div class="product">
        <h3>Rose Mist</h3>
        <p>Price: Rs. 1,500</p>
        <button onclick="sendOrder('Rose Mist')">Order on WhatsApp</button>
    </div>

    <script>
        function sendOrder(productName) {
            // Yahan apna WhatsApp number likhen (Country code ke saath, baghair + sign)
            var phoneNumber = "923001234567"; 
            var message = "Salam, mujhe yeh perfume chahye: " + productName;
            var url = "https://wa.me/" + phoneNumber + "?text=" + encodeURIComponent(message);
            window.open(url, '_blank');
        }
    </script>

</body>
</html>
